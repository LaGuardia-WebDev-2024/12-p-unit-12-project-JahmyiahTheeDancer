<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite Disney show?
        <select id="movie-answer">
          <option value="movie1">A.N.T Farm</option>
          <option value="movie2">KC Undercover</option>
          <option value="movie3">Mighty Med</option>
          <option value="movie4">LabRats</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img id="movie-pic" width="300">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite book?
        <select id="book-answer">
          <option value="book1">The Hate U Give</option>
          <option value="book2">On The Come Up</option>
          <option value="book3">Hunger Games</option>
          <option value="book4">Harry Potter</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img id="book-pic" width="200">
    </div>

   <form id="villain-form">
      <label>
        📖 What is my favorite Disney Villain?
        <select id="villain-answer">
          <option value="villain1">Cruella Deville</option>
          <option value="villain2"> Jafar </option>
          <option value="villain3">Dr.Facilier</option>
          <option value="villain4">Scar</option>
        </select>
      </label>
      <button type="submit">Check Villain Answer</button>
    </form>
    <div id="villain-result">
      <p id="villain-text"></p>
      <img id="villain-pic" width="200">
    </div>






    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie4") {
          $("#movie-text").text("OMGGG  YESSSS!");
           $("#movie-pic").hide().attr("src","https://play-lh.googleusercontent.com/Q2xEt_PARX67VeJMMTRVoo9gd-I6b46C7yeW7TnquZnZrJSf5_X9m-YESl7siJe4QefW=w600-h300-pc0xffffff-pd").slideDown(2000)
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
          $("#book-pic").hide().attr("src","https://mvhsoracle.com/wp-content/uploads/2018/10/5b999df9353af-3-e1540872572355.png").fadeIn(2000)
        } 
        else {
          $("#book-text").text("Sorry not correct!");
        }
      });
      
       //======================Villain add on

       $("#villain-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#villain-answer");
        var answer = $answer.val();

        if (answer === "villain3") {
          $("#villain-text").text("YESSSS!");
          $("#villain-pic").attr("src","https://static.wikia.nocookie.net/disney/images/1/1d/Castingaspell.png/revision/latest?cb=20120720021947")
       
          $("#villain-pic").animate({
         width: "400px",
         marginLeft: "100px",
        }, 1500 );
        
      }
      
        else {
          $("#villain-text").text("Not quite there!");
        }
      });
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
